<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Hirotix</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/auth.css">
    <script src="js/theme.js"></script>
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
</head>

<body>
    <!-- Abstract Background for Glass Effect -->
    <div class="bg-shape shape-1"></div>
    <div class="bg-shape shape-2"></div>
    <div class="bg-shape shape-3" style="background:#e0c3fc; top:auto; bottom:20%; left:-10%;"></div>

    <!-- Navigation -->
    <nav class="navbar glass" style="top: 20px;">
        <a href="index.html" class="logo-brand">
            <div class="brand-icon" style="width: 36px; height: 36px;"></div>
            <span class="brand-text" style="font-size: 1.6rem;">Hirotix<span class="brand-dot">.</span></span>
        </a>
        <div class="nav-buttons">
            <a href="register.html" class="btn btn-outline"
                style="padding: 8px 20px; border-radius: 99px; border: 1px solid #1d1d1f; color: #1d1d1f; text-decoration: none; font-size: 0.9rem; font-weight: 500; transition: background 0.3s; display: inline-block;">Create
                Account</a>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="auth-container">
        <div class="auth-card glass">
            <div class="auth-header">
                <h2>Welcome back</h2>
                <p>Sign in to continue to Hirotix</p>
            </div>

            <form id="loginForm" class="auth-form">
                <div id="loginMessage" class="form-message"></div>

                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" class="form-control" required placeholder="you@example.com">
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" class="form-control" required placeholder="••••••••">
                </div>

                <div class="auth-options">
                    <label class="checkbox-container">
                        <input type="checkbox">
                        Remember me
                    </label>
                    <a href="#" class="forgot-link">Forgot password?</a>
                </div>

                <button type="submit" class="btn btn-large btn-primary w-100" id="loginBtn">
                    <span>Sign In</span>
                </button>
            </form>

            <div class="auth-footer">
                <p>Don't have an account? <a href="register.html">Sign up</a></p>
            </div>
        </div>
    </main>

    <script src="js/api.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const msgDiv = document.getElementById('loginMessage');
            const btn = document.getElementById('loginBtn');

            try {
                // Disable button and show loading state
                btn.disabled = true;
                btn.innerHTML = '<span>Signing in...</span>';
                msgDiv.className = 'form-message';

                const response = await login(email, password);

                msgDiv.textContent = 'Login successful! Redirecting...';
                msgDiv.className = 'form-message success';

                // Redirect based on role
                setTimeout(() => {
                    const user = getCurrentUser();
                    if (user) {
                        if (user.role === 'SEEKER') {
                            window.location.href = 'seeker-dashboard.html';
                        } else if (user.role === 'RECRUITER') {
                            window.location.href = 'recruiter-dashboard.html';
                        } else if (user.role === 'ADMIN') {
                            window.location.href = 'admin-dashboard.html';
                        } else {
                            window.location.href = 'index.html';
                        }
                    } else {
                        window.location.href = 'index.html';
                    }
                }, 1000);
            } catch (error) {
                msgDiv.textContent = error.message || 'Login failed. Please check your credentials.';
                msgDiv.className = 'form-message error';
                btn.disabled = false;
                btn.innerHTML = '<span>Sign In</span>';
            }
        });

        // Add a simple redirect if already logged in (for convenience)
        window.addEventListener('DOMContentLoaded', () => {
            const user = getCurrentUser();
            if (user) {
                if (user.role === 'SEEKER') window.location.href = 'seeker-dashboard.html';
                else if (user.role === 'RECRUITER') window.location.href = 'recruiter-dashboard.html';
            }
        });
    </script>
</body>

</html>
